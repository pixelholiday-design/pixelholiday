<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B5A"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <linearGradient id="lens" x1="150" y1="150" x2="362" y2="362" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BEC9"/>
      <stop offset="100%" stop-color="#1A5F73"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="96" y="148" width="320" height="240" rx="48" fill="white" opacity="0.2"/>
  <!-- Lens bump top -->
  <rect x="176" y="112" width="100" height="48" rx="20" fill="white" opacity="0.15"/>
  <!-- Main lens circle -->
  <circle cx="256" cy="268" r="88" fill="url(#lens)"/>
  <!-- Inner lens ring -->
  <circle cx="256" cy="268" r="64" fill="#0C1829" opacity="0.25"/>
  <!-- Inner lens -->
  <circle cx="256" cy="268" r="44" fill="url(#lens)" opacity="0.7"/>
  <!-- Lens highlight -->
  <circle cx="232" cy="244" r="20" fill="white" opacity="0.5"/>
  <!-- Small highlight -->
  <circle cx="280" cy="292" r="8" fill="white" opacity="0.3"/>
  <!-- Flash -->
  <circle cx="352" cy="180" r="14" fill="white" opacity="0.7"/>
  <!-- V letter subtly in the lens -->
  <path d="M236 250 L256 290 L276 250" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
</svg>
